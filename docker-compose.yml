version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: workflow_pro_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - workflow_network

  backend:
    build: ./backend
    container_name: workflow_pro_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/workflow_pro
      - JWT_SECRET=superSecretKeyForWorkflowPro2026!
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - workflow_network

  frontend:
    build: ./frontend
    container_name: workflow_pro_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - workflow_network

volumes:
  mongo_data:

networks:
  workflow_network:
    driver: bridge
